databases:
  - name: clarksite1db
    plan: free
    databaseName: clarksite1
    user: clarksite1

services:
  - type: web
    plan: free
    name: clarksite1
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn clarksite1.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clarksite1db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
